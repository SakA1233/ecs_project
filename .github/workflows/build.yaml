name: ECR Build and Push

on:
  workflow_call:
    outputs:
      image_tag:
        description: "The commit SHA used to tag the pushed image"
        value: ${{ jobs.build.outputs.image_tag }}

permissions:
  id-token: write   # allows GitHub to issue OIDC token
  contents: read    # allows checkout
  security-events: write

env:
  REPOSITORY: ecs_project-gatus

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.set-tag.outputs.tag }}
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-west-2

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: set-tag
        run: echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build docker image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.set-tag.outputs.tag }}
        run: |
          docker build -t $REGISTRY/$REPOSITORY:$IMAGE_TAG .

      - name: Scan image for vulnerabilities
        id: scan
        uses: anchore/scan-action@v7
        with:
          image: ${{ steps.login-ecr.outputs.registry }}/${{ env.REPOSITORY }}:${{ steps.set-tag.outputs.tag }}
          fail-build: true
          severity-cutoff: high

      - name: Upload scan results to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ steps.scan.outputs.sarif }}

      - name: Push docker image to Amazon ECR
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.set-tag.outputs.tag }}
        run: |
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG